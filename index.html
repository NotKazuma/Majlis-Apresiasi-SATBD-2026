        /* CSS RESET & VARIABLES */
        :root {
            --royal-blue: #0046ad;

            --gold: #f3ca65;
            --gold-gradient: linear-gradient(135deg, #BF953F 0%, #FCF6BA 25%, #B38728 50%, #FBF5B7 75%, #AA771C 100%);
            --white: #ffffff;
            --slide-width: 1920px;
            --slide-height: 1080px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #050a18; color: var(--white); font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* VIEWPORT WRAPPER FOR PERFECT ASPECT RATIO */
        #viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* HARD LOCKED SLIDE CANVAS */
        .slide-canvas {
            width: var(--slide-width);
            height: var(--slide-height);
            background: radial-gradient(circle at 50% 50%, var(--royal-blue) 0%, var(--dark-blue) 100%);
            border: 12px solid var(--gold);
            position: relative;
            display: none; /* Controlled by JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .slide-canvas.active { display: flex; }

        /* DECORATIVE ENGINE */
        .slide-canvas::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(rgba(243, 202, 101, 0.12) 1.5px, transparent 1.5px);
            background-size: 40px 40px; opacity: 0.3; pointer-events: none;
        }

        .decor-ring {
            position: absolute; width: 1400px; height: 1400px;
            border: 2px solid rgba(243, 202, 101, 0.15); border-radius: 50%;
            top: -700px; right: -500px; pointer-events: none;
        }

        /* ENGINE REUSABLE CLASS COMPONENT */
        .gold-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        .category { font-family: 'Cinzel', serif; font-size: 36px; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 30px; color: rgba(255,255,255,0.85); text-align: center; z-index: 5; }
        .title { font-family: 'Cinzel', serif; font-size: 85px; font-weight: 700; text-transform: uppercase; text-align: center; line-height: 1.2; z-index: 5; }
        .sub-label { font-family: 'Playfair Display', serif; font-style: italic; font-size: 46px; color: var(--gold); margin: 30px 0; text-align: center; z-index: 5; }
        .name { font-size: 68px; font-weight: 700; text-align: center; text-transform: uppercase; max-width: 85%; line-height: 1.3; z-index: 5; text-shadow: 0 12px 24px rgba(0,0,0,0.6); }
        
        .divider-box { border: 6px solid var(--gold); padding: 70px 120px; background: rgba(0,0,0,0.3); box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; z-index: 5; }
        
        .group-box { border: 4px solid var(--gold); background: rgba(0, 43, 107, 0.9); padding: 40px 70px; border-radius: 12px; width: 80%; max-width: 1300px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); z-index: 5; }
        .group-list { list-style: none; display: grid; grid-template-columns: 1fr; gap: 15px; }
        .group-list li { font-size: 32px; font-weight: 700; text-transform: uppercase; text-align: left; border-bottom: 1px solid rgba(243, 202, 101, 0.2); padding-bottom: 10px; }
        .group-list li::before { content: "🏆  "; color: var(--gold); }

        .tentatif-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; width: 85%; z-index: 5; margin-top: 20px; }
        .tentatif-item { background: rgba(0,0,0,0.35); border-top: 6px solid var(--gold); padding: 40px; text-align: center; border-radius: 4px; }
        .tentatif-item h3 { font-family: 'Cinzel', serif; font-size: 36px; margin-bottom: 15px; }
        .tentatif-item p { font-size: 24px; font-weight: 500; }

        .badge-icon { font-size: 110px; color: var(--gold); margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(243, 202, 101, 0.6)); z-index: 5; }

        /* UI PERSISTENT NAVIGATION OVERLAY */
        .nav-controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 1000; opacity: 0.2; transition: opacity 0.3s; }
        .nav-controls:hover { opacity: 1; }
        .nav-btn { background: rgba(0,0,0,0.6); border: 2px solid var(--gold); color: var(--gold); width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 24px; transition: 0.2s; }
        .nav-btn:hover { background: var(--gold); color: var(--dark-blue); }

        { type: 'section', category: 'Acara Sampingan', title: 'Cabutan Bertuah', subLabel: 'Sesi 2 & Akhir' },

       
        /* --- SLOT 7: BERSURAI --- */
        { type: 'closing', title: 'Terima Kasih', subLabel: 'Tahniah Kepada Semua Pemenang!', meta: 'Sekolah Agama Taman Bayu Damai' }
    ];

    /* ENGINE CORE CONTROLLER */
    class SlideDeckEngine {
        constructor(data) {
            this.data = data;
            this.currentIndex = 0;
            this.rootElement = document.getElementById('deck-root');
        }

        init() {
            this.renderAllSlides();
            this.updateView();
            this.setupResponsiveScaling();
            this.bindKeyboard();
        }

        renderAllSlides() {
            let htmlBuffer = '';
            this.data.forEach((slide, idx) => {
                htmlBuffer += `<div class="slide-canvas" id="slide-node-${idx}">`;
                htmlBuffer += `<div class="decor-ring"></div>`;

                switch(slide.type) {
                    case 'cover':
                        htmlBuffer += `
                            <div class="category">${slide.category}</div>
                            <h1 class="title gold-text">${slide.title}</h1>
                            <div class="sub-label">${slide.subLabel}</div>
                            <div class="name" style="font-size: 32px; letter-spacing: 4px; font-weight: 500;">${slide.meta}</div>`;
                        break;
                    case 'tentatif':
                        htmlBuffer += `
                            <div class="category">Atur Cara Majlis</div>
                            <h2 class="title gold-text" style="font-size: 65px; margin-bottom: 50px;">Tentatif Program</h2>
                            <div class="tentatif-grid">
                                <div class="tentatif-item"><h3 class="gold-text">07:30 PM</h3><p>Pendaftaran Ibu Bapa & Murid</p></div>
                                <div class="tentatif-item"><h3 class="gold-text">08:00 PM</h3><p>Mesyuarat Agung BKS Ke-9</p></div>
                                <div class="tentatif-item"><h3 class="gold-text">09:00 PM</h3><p>Majlis Anugerah Utama</p></div>
                            </div>`;
                        break;
                    case 'profile':
                        htmlBuffer += `
                            <div class="category">${slide.category}</div>
                            <h2 class="title gold-text">${slide.title}</h2>
                            <div class="sub-label">${slide.subLabel}</div>
                            <div class="name">${slide.name}</div>
                            ${slide.meta ? `<div style="font-family:'Cinzel'; color:var(--gold); margin-top:25px; font-size:24px; letter-spacing:2px;">${slide.meta}</div>` : ''}`;
                        break;
                    case 'section':
                        htmlBuffer += `
                            <div class="divider-box">
                                <div class="category">${slide.category}</div>
                                <h2 class="title gold-text" style="font-size: 70px;">${slide.title}</h2>
                                <div class="sub-label" style="margin-bottom:0;">${slide.subLabel}</div>
                            </div>`;
                        break;
                    case 'individual':
                        htmlBuffer += `
                            <div class="category">${slide.category}</div>
                            <h2 class="title gold-text" style="font-size: 48px; margin-bottom:20px;">${slide.title}</h2>
                            <div class="name">${slide.name}</div>`;
                        break;
                    case 'star':
                        htmlBuffer += `
                            <div class="badge-icon"><i class="fa-solid ${slide.icon}"></i></div>
                            <div class="category">${slide.category}</div>
                            <h2 class="title gold-text" style="font-size: 52px; margin-bottom:20px;">${slide.title}</h2>
                            <div class="name" style="color: var(--gold);">${slide.name}</div>
                            ${slide.meta ? `<div style="margin-top:35px; font-weight:600; font-family:'Cinzel'; border:3px solid var(--gold); padding:15px 45px; border-radius:30px; color:var(--gold); font-size:26px;">${slide.meta}</div>` : ''}`;
                        break;
                    case 'joint-winners':
                        htmlBuffer += `
                            <div class="category">${slide.category}</div>
                            <h2 class="title gold-text" style="font-size: 48px; margin-bottom: 40px;">${slide.title}</h2>
                            <div class="group-box">
                                <ul class="group-list">
                                    ${slide.names.map(n => `<li>${n}</li>`).join('')}
                                </ul>
                            </div>`;
                        break;
                    case 'closing':
                        htmlBuffer += `
                            <h1 class="title gold-text" style="font-size: 110px;">${slide.title}</h1>
                            <div class="sub-label" style="font-size: 52px;">${slide.subLabel}</div>
                            <div style="width: 300px; height: 4px; background: var(--gold); margin: 40px 0;"></div>
                            <div class="name" style="font-size: 28px; letter-spacing: 6px; opacity: 0.8;">${slide.meta}</div>`;
                        break;
                }
                htmlBuffer += `</div>`;
            });
            this.rootElement.innerHTML = htmlBuffer;
        }

        updateView() {
            const nodes = document.querySelectorAll('.slide-canvas');
            nodes.forEach(n => n.classList.remove('active'));
            
            const targetNode = document.getElementById(`slide-node-${this.currentIndex}`);
            if(targetNode) targetNode.classList.add('active');
        }

        next() {
            if (this.currentIndex < this.data.length - 1) {
                this.currentIndex++;
                this.updateView();
            }
        }

        prev() {
            if (this.currentIndex > 0) {
                this.currentIndex--;
                this.updateView();
            }
        }

        bindKeyboard() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); this.next(); }
                if (e.key === 'ArrowLeft') { e.preventDefault(); this.prev(); }
            });
        }

        setupResponsiveScaling() {
            const resize = () => {
                const ww = window.innerWidth;
                const wh = window.innerHeight;
                const scale = Math.min(ww / var_w, wh / var_h);
                const container = document.getElementById('deck-root');
                if (container) {
                    container.style.transform = `scale(${scale})`;
                    container.style.transformOrigin = 'center center';
                }
            };
            const var_w = 1920;
            const var_h = 1080;
            window.addEventListener('resize', resize);
            // Run on frame context
            setTimeout(resize, 100);
        }
    }

    // Instantiation
    const deckEngine = new SlideDeckEngine(PresentationData);
    document.addEventListener('DOMContentLoaded', () => deckEngine.init());
</script>

</body>
</html>
